name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MY_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 仅初始化公开子模块 assets；docker_artifacts 为私有可选仓库，CI 不初始化
          submodules: false

      - name: Init optional submodules (assets only)
        run: git submodule update --init assets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/docker_artifacts/libs
        run: |
          python -m pytest test/ -v --tb=short
