name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 与 infrastructure / simulation 的 CMake 一致：build-essential, cmake, FFTW, Boost.Python, Eigen, pkg-config
      - name: Install system dependencies (FFTW, Boost, Eigen, MPI, HDF5)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential \
              cmake \
              pkg-config \
              libfftw3-dev \
              libboost-all-dev \
              libeigen3-dev

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MY_PRIVATE_KEY_1 }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 仅初始化公开子模块 assets；docker_artifacts 为私有可选仓库，CI 不初始化
          submodules: false

      - name: Init optional submodules (assets only)
        run: git submodule update --init assets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Intel oneAPI MKL（mekil、simulation/rcwa_solver、fdtd_solver 依赖）
      - name: Install Intel oneAPI MKL
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      # 在安装 CUDA 前，通过 Python 脚本手动 Mock 一个虚拟 TTY 设备
      - name: Fix /dev/tty for CUDA installer
        run: |
          sudo python3 -c 'import os; os.mknod("/dev/tty", 0o666)' || true

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: "12.6.0"
          method: 'network'
          sub-packages: '["toolkit"]'
          

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/assets/lib
          CI: "false"
        run: |
          python -m pytest test/ -v --tb=short
